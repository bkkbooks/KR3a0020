body:
  text: 家範卷四宋司馬光撰子上孝經曰夫孝天之經也地之義也民之行也天地之經而民是則之又曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德雖得之君子不貴也又曰五刑之屬三千而罪莫大於不孝孟子曰不孝有五惰其四支不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇鬬狠以危父母五不孝也夫為人子而事親或虧雖有他善纍百不能掩也可不慎乎經曰君子之事親也居則致其敬恭己之身不近危辱養則致其樂樂親之志病則致其憂喪則致其哀祭則致其嚴嚴有恭也孔子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎禮子事父母雞初鳴咸盥潄盛容飾以適父母之所父母之衣衾簟席枕几不傳杖履祇敬之勿敢近傳移也敦牟巵匜非餕莫敢用巵匜酒漿器敦牟黍稷器在父母之所有命之應唯敬對進退周旋慎齊齊莊也升降出入揖遜不敢噦噫嚏咳缺伸跛倚睇視不敢唾洟睇傾視也寒不敢襲癢不敢搔襲謂重衣不有敬事不敢袒裼父黨無容不涉不撅撅揭衣也為人子者出必告反必面告面同耳反言面者從外來宜知親之顔色安否所遊必有常所習必有業緣親之意欲知之恆言不稱老廣敬又為人子者居不主奧坐不中席行不中道立不中門謂與父同宫者也不敢當其尊處室中西南隅謂之奧道有左右中門謂棖闈之中央內則曰命士以上父子皆異宫食饗不為槩槩量也不制待賓客饌具之所有祭祀不為尸尊者之處為其失子道然則尸卜筮無父者聽於無聲視於無形恆若親之將有教使然不登高不臨深不苟訾不苟笑為近其危辱也人之性不欲見毁訾不欲見笑君子樂然後笑孝子不服暗不登危服事也不暗冥之中從事為有非常且嫌失禮也懼辱親也宋武帝即大位春秋已高每旦朝繼母蕭太后未嘗失時刻彼為帝王尚如是况士民乎梁臨川靜惠王宏兄懿為齊中書令為東昏侯所殺諸弟皆被收僧慧思藏宏得免宏避難潛伏與太妃異處每遣使參問起居或謂逃難須密不宜往來宏銜淚答曰乃可無我此事不容暫廢彼在危難尚如是况平時乎為子者不敢自高貴故在禮三賜不及車馬三賜三命也凡仕者一命而受爵再命而受衣服三命而受車馬而身所以尊者備矣卿大夫士之子不受不敢以成尊比踰於父天子諸侯之子不受自卑逺於君不敢以富貴加於父兄國初平章事王溥父祚有賓客溥常朝服侍立客坐不安席祚曰㹠犬不足為之起此可謂居則致其敬矣禮子事父母雞初鳴而起左右佩服以適父母之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之怡悅也苛疥抑按搔摩也出入則或先或後而敬扶持之先後之隨時便也進盥少者奉槃長者奉水請沃盥卒受巾槃承盥水者巾以帨手問所欲而敬進之柔色以溫之溫藉也父母之命勿逆勿怠恃其孝敬之愛則或違懈若飲之食之雖不嗜必嘗而待請後命而去也加之衣服雖不欲必服而待待後命釋藏也又子婦無私貨無私畜無私器不敢私假不敢私與家事統於尊也又為人子之禮冬溫而夏凊昏定而晨省安定其牀衽也省問其安否何如在醜夷不爭醜衆也夷同儕也孟子曰曾子養曾晳必有酒肉將徹必請所與問有餘必曰有曾晳死曾元養曾子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曾子則可謂養志也事親若曾子者可也老萊子孝奉二親行年七十作嬰兒戲身服五采斑斕之衣嘗取水上堂詐跌仆臥地為小兒啼㺯雛於親側欲親之喜漢諫議大夫江革少失父獨與母居遭天下亂盜賊並起革負母逃難備經險阻常採拾以為養遂得俱全於難革轉客下邳貧窮裸跣行傭以供母便身之物莫不畢給建武末年與母歸鄉里每至歲時縣當案比案驗以比之猶今貌閲也革以老母不欲搖動自在轅中挽車不用牛馬由是鄉里稱之曰江巨孝晉西河人王延事親色養夏則扇枕席冬則以身溫被隆冬盛寒體無全衣而親極滋味宋會稽何子平為揚州從事吏月俸得白米輒貨市粟麥人曰所利無幾何足為煩子平曰尊老在東不辦得米何心獨饗白粲每有贈鮮肴者若不可寄至家則不肯受後為海虞令縣祿唯供養母一身不以及妻子人疑其儉薄子平曰希祿本在養親不在為己問者慙而退同郡郭原平養親必以己力傭賃以給供養性甚巧每為人傭作止取散夫價主人設食原平自以家貧父母不辦有肴味唯餐鹽飯而已若家或無食則虛中竟日義不獨飽須日暮作畢受直歸家於里糴買然後舉㸑唐曹成王皋為衡州刺史遭誣在治念太妃老將驚而戚出則囚服就辟入則擁笏垂魚坦坦施施貶潮州刺史以遷入賀既而事得直復還衡州然後跪謝告實此可謂養則致其樂矣禮父母有疾冠者不櫛行不翔憂不為容也言不惰憂不在私好惰不正之言琴瑟不御憂不在樂食肉不至變味飲酒不至變貌憂不在味笑不至矧怒不至詈憂在心難變也齒本曰矧大笑則見疾止復故文王之為世子朝於王季日三三皆曰朝以其禮同雞初鳴而衣服至於寢門外問內竪之御者曰今日安否何如內竪小臣之屬掌外內之通命者御如小史直日矣內竪曰安文王乃喜孝子恆兢兢及日中又至亦如之及莫又至亦如之莫夕也其有不安節則內竪以告文王文王色憂行不能正履節謂居處之故事履蹈地也王季復膳飲食安也然後亦復初憂解武王帥而行之不敢有加焉庶幾程式之帥循也文王有疾武王不脫冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力針藥所勝旬有二日乃間間猶瘳也漢文帝為代王時薄太后常病三年文帝目不交睫衣不解帶湯藥非口所嘗弗進晉范喬父粲仕魏為太宰中郎齊王芳被廢粲遂稱疾闔門不出陽狂不言寢所乘車足不履地子孫常侍左右候其顔色以知其㫖如此三十六年終於所寢之車喬與二弟並棄學業絶人事侍疾家庭至粲沒不出里邑南齊庾黔婁為孱陵令到縣未旬父易在家遘疾黔婁忽心驚舉身流汗即日棄官歸家家人悉驚其忽至時易病始二日醫云欲知差劇但嘗糞甜苦易泄利黔婁輒取嘗之味轉甜滑心愈憂苦至夕每稽顙北辰求以身代俄聞空中有聲曰徵君壽命盡不可延汝誠禱既至改得至月末晦而易亡後魏孝文帝幼有至性年四歲時獻文患癰帝親自吮膿北齊孝昭帝性至孝太后不豫出居南宮帝行不正履容色貶悴衣不解帶殆將旬殿去南宮五百餘步雞鳴而出辰時方還來去徒行不乘輿輦太后所苦小增便即寢伏閣外食飲藥物盡皆躬親太后惟常心痛不自堪忍帝立侍帷前以爪搯手心血流出袖此可謂病則致其憂矣經曰孝子之喪親也哭不哀氣竭而息聲不委曲禮無容觸地無容言不文不為文飾服美不安不安美飾故服縗麻聞樂不樂悲哀在心故不樂也食㫖不甘㫖美也不甘美味故蔬食水飲此哀戚之情也三日而食教民無以死傷生毁不滅性此聖人之政也不食三日哀毁過情滅性而死虧孝道故聖人制禮施教不令至于殞滅喪不過三年示民有終也三年之喪天下達禮使不肖企及賢者俯從夫孝子有終身之憂聖人以三年為制者使人有終竟之限也為之棺椁衣衾而舉之周尸為棺周棺為椁衣謂斂衣衾被也舉謂舉尸內於棺也陳其簠簋而哀戚之簠簋祭器也陳奠素器而不見親故哀戚之劈踊哭泣哀以送之男踊女劈袒載送之卜其宅兆而安厝之宅墓穴也兆塋域也葬事大故卜之為之宗廟以鬼享之立廟祔祖之後則以鬼禮享之春秋祭祀以時思之寒暑變移益用增感以時祭祀展其孝思也生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣君子之於親喪固所以自盡也不可不勉喪禮備在方冊不可悉載孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也高子皋執親之喪也子皋孔子弟子名柴泣血三年言泣無聲如血出未嘗見齒言笑之微君子以為難顔丁善居喪顔丁魯人始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息從隨也慨憊貌唐太常少卿蘇頲遭父喪睿宗起復為工部侍郎頲固辭上使李日知諭㫖日知終坐不言而還奏曰臣見其哀毁不忍發言恐其殞絶上乃聽其終制左庶子李涵為河北宣慰使會丁母憂起復本官而行每州縣郵驛公事之外未嘗啓口蔬飯飲水席地而息使還請罷官終喪制代宗以其毁瘠許之自餘能盡哀竭力以喪其親孝感當時名光後來者世不乏人此可謂喪則致其哀矣古之祭禮詳矣不可遍舉孔子曰祭如在君子事死如事生事亡如事存齊三日乃見其所為齊者思之熟也祭之日樂與哀半饗之必樂已至必哀外盡物內盡志入室僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其嘆息之聲周還出户謂薦設時也無尸者闔戶若食間則有出戶而聽之是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎存著則謂其思念也齊齊乎其敬也愈愈乎其忠也勿勿諸其欲其饗之也勿勿猶勉勉也詩曰神之格思不可度思矧可斁思格至也矧况也斁厭也言孝子之享親盡其敬愛之心而已矣安知神之所處於彼乎於此乎况敢有厭怠之心乎此其大略也孟蜀太子賓客李鄲年七十餘享祖考猶親滌器人或代之不從以為無以達追慕之意此可謂祭則致其嚴矣經曰身體髮膚受之父母不敢毁傷孝之始也曾子有疾召門弟子曰啓豫足啓豫手鄭曰啓開也曽子以為身體受於父母不敢毁傷故使弟子開衾而視之詩云戰戰兢兢如臨深淵如履薄氷孔曰言此詩者喻己常慎恐有毁傷而今而後吾知免夫小子樂正子春下堂而傷足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曾子曾子聞諸夫子曰天之所生地之所養惟人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣曽子聞諸夫子述曾子所聞於孔子之言故君子頃步而弗敢忘孝也今豫忘孝之道豫是以有憂色也一舉足而不敢忘父母一出言而不敢忘父母一舉足而不敢忘父母是故道而不徑舟而不游不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣徑步邪趨疾也或曰親有危難則如之何亦憂身而不救乎曰非謂其然也孝子奉父母之遺體平居一毫不敢傷也及其徇仁蹈義雖赴湯火無所辭况救親於危難乎古以死徇其親者多矣晉末烏程人潘綜遭孫恩亂攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃語綜我不能去汝走可脫幸勿俱死驃困乏坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒少自能走今為老子不去孝子不惜死可活此兒賊因斫驃綜乃抱父於腹下賊斫綜頭面凡四創綜當時悶絶有一賊從傍來會曰卿舉大事此兒以死救父云何可殺殺孝子不祥賊乃止父子並得免齊射聲校尉庾道愍所生母漂流交州道愍尚在襁褓及長知之求為廣州綏寧府佐至府而去交州尚逺乃自負擔冒嶮自達及至州尋求母經年不獲日夜悲泣嘗入村日暮雨驟乃寄止一家有嫗負薪自外還道愍心動因訪之乃其母也於是俯伏號泣逺近赴之莫不揮淚梁湘州主簿吉翂孚云切父天監初為原鄉令為吏所誣逮詣廷尉翂年十五號泣衢路祈請公卿行人見者皆為隕涕其父理雖清白而恥為吏訊乃虛自引咎罪當大辟翂乃撾登聞鼓乞代父命武帝嘉異之尚以其童稚疑受教於人敕廷尉蔡法度嚴加脅誘取其欵實法度乃還寺盛陳徽纆厲色問曰爾求代父死敕已相許便應伏法然刀鋸至劇審能死不且爾童孺志不及此必人所教姓名是誰若有悔異亦相聽許對曰囚雖蒙弱豈不知死可畏憚顧諸弟幼藐唯囚為長不忍見父極刑自延視息所以內斷胸臆上干萬乘今欲殉身不測委骨泉壤此非細故奈何受人教耶法度知不可屈撓乃更和顔誘語之曰主上知尊侯無罪行當釋亮觀君神儀明秀足稱佳童今若轉辭幸父子同濟奚以此妙年苦求湯鑊翂曰凡鯤鮞螻蟻尚惜其生况在人斯豈願虀粉但父挂深劾必正刑書故思殞仆冀延父命翂初見囚獄掾依法備加桎梏法度矜之命脫其二械更令著一小者翂弗聽曰翂求代父死死囚豈可減乎竟不脫械法度以聞帝乃宥其父子丹陽尹王志求其在廷尉故事并諸鄉居欲於歲首舉充純孝翂曰異哉王尹何量翂之薄也夫父辱子死斯道固然若翂有靦面目當其此舉則是因父買名一何甚辱拒之而止此其章章尤著者也家範卷四
