body:
  text: 家範卷十宋司馬光撰舅甥舅姑婦妾乳母舅甥秦康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也曰我見舅氏如母存焉故作渭陽之詩漢魏郡霍諝有人誣諝舅宋光於大將軍梁商者以為妄刋文章坐繫洛陽詔獄掠考困極諝時年十五奏記於商為光訟冤辭理明切商髙諝才志即為奏原光罪由是顯名晉司空郤鑒頰邊貯飯以活外甥周翼見伯叔父門鑒薨翼為剡令解職而歸席苫心喪三年此皆舅甥之有恩者也舅姑晏子稱姑慈而從婦聽而婉禮之善物也禮子婦有勤勞之事雖甚愛之姑縱之而寧數休之不可愛此而移苦於彼也子婦未孝未敬勿庸疾怨庸之為言用也姑教之若不可教而后怒之怒譴責也不可怒子放婦出而不表禮焉表猶明也猶為隱之不表明其犯禮之過也季康子問於公父文伯之母曰主亦有以語肥也對曰吾聞之先姑曰君子能勞後世有繼能勞能自卑勞貴而不驕也有繼子孫不廢也子夏聞之曰善哉商聞之曰古之嫁者不及舅姑謂之不幸夫婦學於舅姑者禮也唐禮部尚書王圭子敬直尚南平公主禮有婦見舅姑之儀自近代公主出降此禮皆廢圭曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就席而坐令公主親執笲行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自圭始也笲之為器似筥以竹或葦為之衣以青繒以盛棗栗腶修之贄婦內則婦事舅姑與子事父母略同見子門舅沒則姑老謂傳家事於長婦也冢婦所祭祀賔客每事必請於姑婦雖受傳猶不敢專行也介婦請於冢婦以其代姑之事介婦衆婦也舅姑使冢婦毋怠不友無禮於介婦舅姑若使介婦無敢敵耦於冢婦雖有勤勞不敢掉磬不敢並行不敢並命不敢並坐下冢婦也命為使令凡婦不命適私室不敢退婦事舅姑者也婦將有事大小必請於舅姑不敢專行子婦無私貨無私蓄無私器不敢私假不敢私與家事統於尊也婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜或賜之謂私親兄弟若反賜之則辭不得命如更受賜藏以待乏待舅姑之乏也不得命者不見許也婦若有私親兄弟將與之則必復請其故賜而后與之曹大家女戒曰舅姑之意豈可失哉固莫尚於曲從矣姑云不爾而是固宜從命姑云爾而非猶宜順命勿得違戾是非爭分曲直此則所謂曲從矣故女憲曰婦如影響焉不可賞影響言順從也漢廣漢薑詩妻同郡龎盛之女也詩事母至孝妻奉順尤篤母好飲江水去舍六七里妻嘗泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母具對姑感慙呼還恩養愈謹其子後因逺汲溺死妻恐姑哀傷不敢言而託以行學不在河南樂羊子從學七年不反妻常躬勤養姑嘗有它舍雞謬入園中姑盜殺而食之妻對雞不餐而泣姑怪問其故妻曰自傷居貧使食它肉姑竟棄之然則舅姑有過婦亦可幾諫也後魏樂部郎胡長命妻張氏事姑王氏甚謹太安中京師禁酒張以姑老且患私為醖之為有司所糾王氏詣曹自首由已私釀張氏曰姑老抱患張主家事姑不知釀主司不知所處平原王陸麗以狀奏文成義而赦之唐鄭義宗妻盧氏略涉書史事舅姑甚得婦道嘗夜有強盜數十人持杖鼓譟踰垣而入家人悉奔竄唯有姑獨在堂盧冒白刃往至姑側為賊捶擊幾至於死賊去後家人問何獨不懼盧氏曰人所以異禽獸者以其有仁義也鄰里有急尚相赴救況在於姑而可委棄若萬一危禍豈宜獨生其姑每云古人稱歲寒然後知松柏之後凋也吾今乃知盧新婦之心矣若盧氏者可謂能知義矣詩何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德舜妻堯之二女行婦道於虞氏唐岐陽公主憲宗之嫡女穆宗之母妹母懿安郭皇后尚父子儀之孫也適工部尚書杜悰逮事舅姑杜氏大族其他宜為婦禮者不翅數千人主卑委怡順奉上撫下終日惕惕屛息拜起一同家人禮度二十餘年人未嘗以絲髮間指為貴驕承奉大族時歲獻饋吉凶賻助必親經手姑涼國太夫人寢疾比喪及葬主奉養蚤夜不解帶親自嘗藥粥飯不經心手一不以進既而哭泣哀號感動它人彼天子之女猶不敢失婦道奈何臣民之女乃敢恃其貴富以驕其舅姑為婦若此為夫者宜棄之為有司者治其罪可也妾內則雖婢妾衣服飲食必後長者人貴賤不可以無禮妾事女君猶臣事君也尊卑殊絶禮節宜明是以緑衣黃裳詩人所刺慎夫人與竇后同席袁盎引而却之董宏請尊丁傅師丹劾奏其罪皆所以防微杜漸抑禍亂之原也或者主母屈已以下之猶當貶抑退避謹守其分況敢挾其主父與子之勢陵慢其女君乎衛宗二順者衛宗室靈王之夫人及其傅妾也秦滅衛君乃封靈王世家使奉其祀靈王死夫人無子而守寡傅妾有子代後傅妾事夫人八年不衰供養愈謹夫人謂傅妾曰孺子養我甚謹子奉祀而妾事我我不願也且吾聞主君之母不妾事人今我無子於禮斥絀之人也而得留以盡節是我幸也今又煩孺子不改故節我甚內慙吾願出居外以時相見我甚便之傅妾泣而對曰夫人欲使靈氏受三不祥耶公不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人欲居外使婢妾居內是三不祥也妾聞忠臣事君無時懈倦孝子養親患無日也妾豈敢以少貴之故變妾之節哉供養固妾之職也夫人又何勤乎夫人曰無子之人而辱主君之母雖子欲爾衆人謂我不知禮也吾終願居外而已傅妾退而謂其子曰吾聞君子處順奉上下之儀修先古之禮此順道也今夫人難我將欲居外使我處內逆也處逆而生豈若守順而死哉遂欲自殺其子泣而守之不聽夫人聞之懼遂許傅妾留終年供養不衰後唐莊宗不知禮尊其所生為太后而以嫡母為太妃太妃不以愠太后不敢自尊二人相好終始不衰事見妻門是亦近世所難乳母保母附內則異為孺子室於宫中特歸一處以處之擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君養子之禮也諸母衆妾也可者傅御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者他人無事不往魯孝公義保臧氏初孝公父武公與其二子長子括中子戲朝周宣王宣王立戲為魯太子武公薨戲立是為懿公孝公時號公子稱最少義保與其子俱入宫養公子稱括之子曰伯御與魯人作亂攻殺懿公而自立求公子稱於宫中入殺之義保聞伯御將殺稱衣其子以稱之衣卧於稱之處伯御殺之義保遂抱稱以出遇稱之舅魯大夫於外舅問稱死乎義保曰不死在此舅曰何以得免義保曰以吾子代之義保遂抱以逃十一年魯大夫皆知稱之在保於是請周天子殺伯御立稱為孝公秦攻魏破之殺魏王誅諸公子而一公子不得令魏國曰得公子者賜金千鎰匿之者罪至夷公子乳母與公子俱逃魏之故臣見乳母識之曰乳母固無恙乎乳母曰嗟乎吾奈公子何故臣曰今公子安在吾聞秦令曰有能得公子者賜金千鎰匿之者罪至夷乳母儻知其處乎而言之則可以得千金知而不言則昆弟無類矣乳母曰吁我不知公子之處故臣曰我聞公子與乳母俱逃曰吾雖知之亦終不可以言故臣曰今魏國已破亡族已滅矣子匿之尚誰為乎母曰吁夫見利而反上者逆畏死而棄義者亂也今持逆亂而以求利吾不為也且夫凡為人養子者務生之非為殺之也豈可以利賞畏誅之故廢正義而行逆節哉妾不能生而令公子禽矣乳母遂抱公子逃於深澤之中故臣以告秦軍追見爭射之乳母以身為公子蔽矢矢著身者數十與公子俱死秦君聞之貴其能守忠死義乃以卿禮葬之祠以太牢寵其兄為五大夫賜金百鎰唐初王世充之臣獨孤武都謀叛歸唐事覺誅死子師仁始三歲世充憐其幼不殺命禁掌之其乳母王蘭英求自髠鉗入保養師仁世充許之蘭英鞠育備至時喪亂凶飢人多餓死蘭英乞丏捃拾每有所得輒歸哺師仁自惟啖土飲水而已久之詐為捃拾竊抱師仁奔長安髙祖嘉其義下詔曰師仁乳母王氏慈惠有聞撫育無倦提携遺幼背逆歸朝宜有褒隆以錫其號可封夀永郡君五代漢鳯翔節度使侯益入朝右衛大將軍王景崇叛於鳯翔有怨於益盡殺其家屬七十餘人益孫延廣尚襁褓乳母劉氏以己子易之抱延廣而逃乞食於路以達大梁歸於益家嗚呼人無貴賤顧其為善何如耳觀此乳保忘身徇義字人之孤名流後世雖古烈士何以過哉家範卷十
