body:
  text: 家範卷六宋司馬光撰女孫伯叔父姪女禮女子十年不出恆居內也姆教婉娩聽從婉謂言語也娩謂容貌也執麻枲治絲繭織紝組紃學女事以共衣服紃縧觀於祭祀納酒漿籩豆菹醢禮相助奠當及女時而知十有五年而笄謂應年許嫁者女子許嫁笄而字之其未許嫁二十而笄二十而嫁古者婦人先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也謂與天子諸侯同姓者也嫁女者必就尊者教成之教之者女師也祖廟女所出之祖也公君也宗室宗子之家也婦德貞順也婦言辭令也婦容婉娩也婦功麻絲也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為爼實蘋藻為羮菜祭無牲牢告事耳非正祭也其祭盛用黍云君使有司告之宗子之家若其祖廟已毁則為壇而告焉曹大家女戒曰今之君子徒知訓其男檢其書傳殊不知夫主之不可不事禮義之不可不存但教男而不教女不亦蔽於彼此之教乎禮八歲始教之書十五而志於學矣獨不可依此以為教哉夫云婦德不必才明絶異也婦言不必辨口利辭也婦容不必顔色美麗也婦功不必工巧過人也清間貞靜守節整齊行已有恥動靜有法是謂婦德擇辭而說不道惡語時然後言不厭於人是謂婦言盥浣塵穢服飾鮮潔沐浴以時身不垢辱是謂婦容専心紡績不好戲笑潔齊酒食以奉賔客是謂婦功此四者女之大德而不可乏者也然為之甚易唯在存心耳凡人不學則不知禮義不知禮義則善惡是非之所在皆莫之識也於是乎有身為暴亂而不自知其非也禍辱將及而不知其危也然則為人皆不可以不學豈男女之有異哉是故女子在家不可以不讀孝經論語及詩禮略通大義其女功則不過桑麻織績制衣裳為酒食而已至於刺繡華巧管絃歌詩皆非女子所宜習也古之賢女無不好學左圖右史以自警戒漢和熹鄧皇后六歲能史書史書周宣王太史籕所作大篆十五篇也前漢書曰教學童之書也十二通詩論語諸兄每讀經傳輒下意難問下意猶出意也志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝修婦業暮誦經典家人號曰諸生其餘班婕妤曹大家之徒以學顯當時名垂後來者多矣漢珠崖令女名初年十三珠崖多珠繼母連大珠以為係臂及令死當還葬法珠入於關者死繼母棄其係臂珠其男年九嵗好而取之置母鏡奩中皆莫之知遂與家室奉喪歸至海關海關候吏搜索得珠十枚於鏡奩中吏曰嘻此值法無可奈何誰當坐者初在左右心恐繼母去置奩中乃曰初坐之吏曰其狀如何初對曰君子不幸夫人解係臂去之初心惜之取置夫人鏡奩中夫人不知也吏將初劾之繼母意以為實然憐之因謂吏曰願且待幸無劾兒兒誠不知也兒珠妾之係臂也君不幸妾解去之心不忍棄且置鏡奩中迫奉喪忽然忘之妾當坐之初固曰實初取之繼母又曰兒但讓耳實妾取之因涕泣不能自禁女亦曰夫人哀初之孤强名之以活初身夫人實不知也又因哭泣泣下交頸送喪者盡哭哀慟傍人莫不為酸鼻揮涕關吏執筆劾不能就一字關候垂泣終日不忍决乃曰母子有義如此吾寧坐之不忍加文母子相讓安知孰是遂棄珠而遣之既去乃知男獨取之宋㑹稽寒人陳氏有女無男祖父母年八九十老無所知父篤癃疾母不安其室遇歲饑三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲娶為婦長女自傷㷀獨誓不肯行祖父母尋相繼卒三女自營殯葬為菴舍居墓側又諸暨東汙里屠氏女父失明母痼病親戚相棄鄉里不容女移父母逺住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳鄉里多欲娶之女以無兄弟誓守墳墓不嫁唐孝女王和子者徐州人其父及兄為防秋卒戍涇州元和中吐蕃冦邊父兄戰死無子母先亡和子年十七聞父兄殁於邊披髮徒跣縗裳獨往涇州行丐取父兄之喪歸徐營葬植松柏剪髮壞形廬於墓所節度使王智興以狀奏之詔旌表門閭此數女者皆以單惸事其父母生則能養死則能葬亦女子之英秀也唐奉天竇氏二女雖生長草野幼有志操永泰中羣盜數千人剽掠其村落二女皆有容色長者年十九幼者年十六匿巖穴間盜曳出之騎逼以前臨壑谷深數百尺其姊先曰吾寧就死義不受辱即投崖下而死盜方驚駭其妹從之自投折足敗面血流被體盜乃捨之而去京兆尹第五琦嘉其貞烈奏之詔旌表門閭永蠲其家丁役二女遇亂守節不渝視死如歸又難能也漢文帝時有人上書齊太倉令淳于意有罪當刑詔獄逮繫長安意有五女隨而泣意怒罵曰生女不生男緩急無可使者於是少女緹縈傷父之言乃隨父西上書曰妾父為吏齊中稱其亷平今坐法當刑妾切痛死者不可復生而刑者不可復屬雖欲改過自新其道莫由終不可得妾願入身為官婢以贖父刑罪使得改行自新也書聞上悲其意此歲中亦除肉刑法緹縈一言而善天下䝉其澤後世賴其福所及逺哉後魏孝女王舜者趙鄒人也父子春與從兄長欣不協齊亡之際長欣與其妻同謀殺子春舜時年七歲又二妹粲年五歲璠年二歲並孤苦寄食親戚舜撫育二妹恩義甚篤而舜隂有復讎之心長欣殊不備姊妹俱長親戚欲嫁輒拒不從乃密謂二妹曰我無兄弟致使父讎不復吾輩雖女子何用生為我欲共汝報復何如二妹皆垂涕曰唯姊所命夜中姊妹各持刀踰牆入手殺長欣夫婦以告父墓因詣縣請罪姊妹爭為謀首州縣不能决文帝聞而嘉歎原罪禮父母之讎不與共戴天舜以幼女藴志發憤卒袖白刃以揕讎人之胸豈可以壯男子反不如哉孫書曰辟不辟忝厥祖詩云無念爾祖聿修厥德然則為人而怠於德是忘其祖也豈不重哉晉李密犍為人父早亡母何氏改醮密時年數歲感戀彌至蒸蒸之性遂以成疾祖母劉氏躬自撫養密奉事以孝謹聞劉氏有疾則泣側息未嘗解衣飲膳湯藥必先嘗後進仕蜀為郎蜀平泰始初詔徴為太子洗馬密以祖母年髙無人奉養遂不應命上疏曰臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以私情區區不敢棄逺臣密今年四十有四祖母劉氏今年九十有六是臣盡節於陛下之日長而報養劉氏之日短也烏鳥私情乞願終養武帝矜而許之齊彭城郡丞劉瓛音桓有至性祖母病疽經年手持膏藥潰指為爛後魏張元芮城人世以純至為鄉里所推元年六歲其祖以其夏中熱欲將元就井浴元固不肯謂其貪戲乃以杖擊其頭曰汝何為不肯浴元對曰衣以蓋形為覆其䙝元不能䙝露其體於白日之下祖異而捨之年十六其祖喪明三年元恆憂泣晝夜讀佛經禮拜以祈福祐每言天人師乎元為孫不孝使祖喪明今願祖目見明元求代暗夜夢見一老翁以金鑱療其祖目於夢中喜躍遂即驚覺乃遍告家人三日祖目果明其後祖卧疾再周元恆隨祖所食多少衣冠不解旦夕扶侍及祖沒號踊絶而復蘇隨其父水漿不入口三日鄉里感嘆異之縣博士楊輒等二百餘人上其狀有詔表其門閭此皆為孫能養者也唐僕射李公名訥有居第在長安修行里其密鄰即故日南楊相也名收丞相早歲與之有舊及登庸權傾天下相君選妓數輩以宰府不可外館棟宇無便事者獨書閣東鄰乃李公冗舍也意欲吞之垂涎少俟且遲遲於發言忽一日謹致一函以為必遂及復札大失所望又踰月召李公之吏得言者欲以厚價購之或曰水竹别墅交質李公復不許又逾月乃授公之子弟官冀其稍動初意竟亡回命有王處士者知書善棋加之敏辨李公寅夕與之同處丞相密召以誠告之託其諷諭王生忭奉其㫖勇於展效然以李公褊直伺良便者久之一日公遘病生獨侍前公謂曰筋衰骨虛風氣因得乘間而入所謂空穴來風枳枸來巢也生對曰然向聆西院梟集樹杪某心憂之果致微恙空院之來妖禽猶枳枸來巢矣且知齎器換緡未如鬻之以贍醫藥李公卞急揣知其意怒髮上植厲聲曰男子寒死餧死鵩窺而死亦其命也先人之敝廬不忍為權貴優笑之地揮手而别自是王生及門不復接矣平盧節度使楊損初為殿中侍御史家新昌里與路巖第接巖方為相欲易其廄以廣第損宗族仕者十餘人議曰家世盛衰繫權者喜怒不可拒也損曰今尺寸土皆先人舊物非吾等所有安可奉權臣邪窮達命也卒不與巖不悅使損按獄黔中年餘還彼室宅尚以家世舊物不忍棄失況諸侯之於社稷大夫之於宗廟乎為人孫者可不念哉伯叔父禮服兄弟之子猶子也蓋聖人緣情制禮非引而進之也漢第五倫性至公或問倫曰公有私乎對曰吾兄子嘗病一夜十往退而安寢吾子有病雖不省視而竟夕不眠若是者豈可謂無私乎伯魚賢者豈肯厚其兄子不如其子哉直以數往視之故心安終夕不視故心不安耳而伯魚更以此語人益所以見其公也宗正劉平更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一歲平抱仲女而棄其子母欲還取平不聽曰力不能兩活仲不可以絶類遂去而不顧侍中淳于恭兄崇卒恭養孤幼教誨學問有不如法輒反杖用自杖箠以感悟之兒慙而改過侍中薛包弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓頓猶廢也者曰吾少時所理意所戀也器物取其朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給晉右僕射鄧攸永嘉末石勒過泗水攸以牛馬負妻子而逃又遇賊掠其牛馬步走擔其兒及其弟子綏度不能兩全乃謂其妻曰吾弟早亡唯有一息理不可絶止應自棄我兒耳幸而得存我後當有子妻泣而從之乃棄其子而去卒以無嗣時人義而哀之為之語曰天道無知使鄧伯道無兒弟子綏服攸喪三年太尉郤鑒少值永嘉亂在鄉里甚窮餒鄉人以鑒名德傳共飯之時兄子邁外甥周翼並小常攜之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有所存鑒於是獨往食訖以飯著兩頰邊還吐與二兒後並得存同過江邁位至護軍翼為剡縣令鑒之薨也翼追撫育之恩解職而歸席苫心喪三年世有殺其孤規財利者獨何心哉姪宋義興人許昭先叔父肇之坐事繫獄七年不判子姪二十許人昭先家最貧薄専獨伸訴無日在家餉饋肇之莫非珍新資産既盡賣宅以充之肇之諸子倦怠惟昭先無有懈息如是七載尚書沈演之嘉其操行肇之事由此得釋唐栁泌叙其父天平節度使仲郢行事云事季父太保名公權如事元公名公綽非甚疾見太保未嘗不束帶任大京兆鹽鐵使通衢遇太保必下馬端笏候太保馬過方登車每暮束帶迎太保馬首候起居太保屢以為言終不以官達稍改太保常言於公卿間云元公之子事某如事嚴父古之賢者事諸父如父禮也家範卷六
