body:
  text: 家範卷一宋司馬光撰周易離下巽上家人利女貞彖曰家人女正位乎內謂二也男正位乎外謂五也家人之義以內為本故先說女也男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人由內以相成熾也君子以言有物而行有恆家人之道修於近小而不妄也故君子以言必有物而口無擇言行必有恆而身無擇行初九間有家悔亡凡教在初而法在始家瀆而後嚴之志變而後治之則悔矣處家人之初為家人之始故宜必以間有家然後悔亡也象曰間有家志未變也六二無攸遂在中饋貞吉居內處中履得其位以陰應陽盡婦人之正義無所必遂職乎中饋巽順而已是以貞吉也象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝以陽處陽剛嚴者也處下體之極為一家之長者也行與其慢寧過乎恭家與其瀆寧處乎嚴是以家人雖嗃嗃悔厲猶得其道婦子嘻嘻乃失其節也象曰家人嗃嗃未失也婦子嘻嘻失家節也六四富家大吉能以其富順而處位故大吉也若但能富其家何足為大吉體柔居巽履得其位明於家道以至近尊能富其家也象曰富家大吉順在位也九五王假有家勿恤吉假至也履正而應處尊體巽王至斯道以有其家者也居於尊位而明於家道則下莫不化矣父父子子兄兄弟弟夫夫婦婦六親和睦交相愛樂而家道正正家而天下定矣故王假有家則勿恤而吉象曰王假有家交相愛也上九有孚威如終吉處家人之終居家道之成刑於寡妻以著於外者也故曰有孚凡物以猛為本者則患在寡恩以愛為本者則患在寡威故家人之道尚威嚴也家道可終唯信與威身得威敬人亦如之反之於身則知施於人也象曰威如之吉反身之謂也大學曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家孝經曰閨門之內具禮矣乎宮中之門其小者謂之閨禮者所以治天下之法也閨門之內其治至狹然而治天下之法舉在是矣嚴父嚴兄事君事長之禮也妻子臣妾猶百姓徒役也徒役皂牧也妻子猶百姓臣妾猶皂牧御之必以其道然後上下相安昔四嶽薦舜於堯曰瞽子父頑母嚚象傲無目曰瞽舜父有目不能分别好惡故時人謂之瞽配字曰瞍瞍無目之稱心不則德義之經為頑象舜弟之字傲慢不友言並惡克諧以孝蒸蒸乂不格姦諧和蒸進也言能以至孝和諧頑嚚昏傲使進進以善自治不至於姦惡帝曰我其試哉言欲試舜觀其行跡女于時觀厥刑于二女女妻刑法也堯於是以二女妻舜觀其法度接二女以治家釐降二女于媯汭嬪于虞降下嬪婦也舜為匹夫能以義禮下帝女之心於所居媯水之汭使行婦道於虞氏帝曰欽哉歎舜能修己行敬以安人則其所能者大矣詩稱文王之德曰刑于寡妻至于兄弟以御于家邦此皆聖人正家以正天下者也降及後世爰自卿士以至匹夫亦有家行隆美可為人法者今采集以為家範治家衛石碏曰君義臣行父慈子孝兄愛弟敬所謂六順也齊晏嬰曰君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也夫治家莫如禮男女之別禮之大節也故治家者必以為先禮男女不雜坐不同椸枷不同巾櫛不親授受嫂叔不通問諸母不潄裳外言不入於梱內言不出於梱女子許嫁纓非有大故不入其門姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食皆為重别也不雜坐謂男子在堂女子在房也椸可以枷衣者通問謂相稱謝也諸母庶母也潄浣也庶母賤可使潄衣不可使潄裳裳賤尊之者亦所以逺别也外言內言男女之職也不出入者不以相問也梱門限也女子許嫁繫纓有從人之端也大故宮中有災變若疾病然後入也女子有宮者亦謂由命士以上也春秋傳曰群公子之舍則已畢矣女子十年而不出嫁及成人可以出矣猶不與男子共席而坐亦逺别也男女非有行媒不相知名見媒往來傳婚姻之言乃相知姓名非受幣不交不親重别有禮乃相纒固故日月以告君周禮凡取判妻入子者媒氏書之以告君謂此也齊戒以告鬼神婚禮凡受女之禮皆於廟為神席以告鬼神謂此也為酒食以召鄉黨僚友會賓客也以厚其别也厚重慎也又男女非祭非喪不相授器祭嚴喪遽不嫌也其相授則女受以篚其無篚則皆坐奠之而后取之奠停地也外內不共井不共湢浴不通寢席不通乞假男子入內不嘯不指夜行以燭無燭則止嘯讀為叱叱嫌有隱使也女子出門必擁蔽其面夜行以燭無燭則止擁猶障也道路男子由右女子由左地道尊右又子生七年男女不同席不共食厚其别也男子十年出就外傅居宿於外外傅教學之師女子十年不出恆居內也又婦人送迎不出門見兄弟不踰閾閾限也又國君夫人父母在則有歸寧沒則使卿寧魯公父文伯之母如季氏如之也康子在其朝自其外朝也與之言弗應從之及寢門弗應而入入康子之家也康子辭於朝而入見辭其家臣入見敬姜也曰肥也不得聞命無乃罪乎曰寢門之內婦人治其業焉上下同之寢門正室之門也上下天子已下也夫外朝子將業君之官職焉內朝子將庀季氏之政焉庀治也皆非吾所敢言也公父文伯之母季康子之從祖叔母也康子往焉䦱門而與之言皆不踰閾仲尼聞之以為别於男女之禮矣䦱闢也門寢門也漢萬石君石奮無文學恭謹舉無與比奮長子建次甲次乙次慶皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃舉集其門故號奮為萬石君孝景季年萬石君以上大夫祿歸老于家子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不誚讓為便坐對案不食然後諸子相責因長老肉袒固謝罪改之乃許子孫勝冠者在側雖燕必冠申申如也僮僕欣欣如也唯謹其執喪哀戚甚子孫遵教亦如之萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及也建元二年郎中令王臧以文學獲罪皇太后太后以為儒者文多質少今萬石君家不言而躬行乃以長子建為郎中令少子慶為內史建老白首萬石君尚無恙每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏身自浣灑復與侍者不敢令萬石君知之以為常萬石君徙居陵里內史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒謝罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里里中長老皆走匿而內史坐車自如固當乃謝罷慶慶及諸子入里門趨至家萬石君元朔五年卒建哭泣哀思杖乃能行歲餘建亦死諸子孫咸孝然建最甚甚孝於萬石君樊重字君雲世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營經産業物無所棄課役童𨽻各得其宜故能上下戮力財利歲倍乃至開廣田土三百餘頃其所起廬舍皆重堂髙閣陂渠灌注又池魚牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉資至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘終其素所假貸人間數百萬遺令焚削文契債家聞者皆慙爭往償之諸子從敕竟不肯受南陽馮良志行高潔遇妻子如君臣宋侍中謝𢎞微從叔混以劉毅黨見誅混妻晉陽公主改適琅邪王練公主雖執意不行而詔與謝氏離絶公主以混家事委之𢎞微混仍世宰相一門兩封田業十餘處僮役千人唯有二女年並數歲𢎞微經紀生業事若在公一錢尺帛出入皆有文簿宋武受命晉陽公主降封東鄉君節義可嘉聽還謝氏自混亡至是九年而室宇修整倉廩充盈門徒不異平日田疇墾闢有加於舊東鄉歎曰僕射生平重此一子可謂知人僕射為不亡矣中外親姻里黨故舊見東鄉之歸者入門莫不歎息或為流涕感𢎞微之義也𢎞微性嚴正舉止必修禮度婢僕之前不妄言笑由是尊卑大小敬之若神及東鄉君薨遺財千萬園宅十餘所及會稽吳興琅邪諸處太傅安司空琰時事業奴僮猶數百人公私或謂室內資財宜歸二女田宅僮僕應屬𢎞微𢎞微一物不取自以私祿營葬混女夫殷睿素好摴蒱聞𢎞微不取財物乃濫奪其妻妹及伯母兩姑之分以還戲責內人皆化𢎞微之讓一無所爭𢎞微舅子領軍將軍劉湛謂𢎞微曰天下事宜有裁衷卿此不問何以居官𢎞微笑而不答或有譏以謝氏纍世財産充殷君一朝棄擲譬棄物江海以為廉耳𢎞微曰親戚爭財為鄙之甚今內人尚能無言豈可道之使爭今分多共少不至有乏身死之後豈復見關劉君良瀛州樂壽人纍世同居兄弟至四從皆如同氣尺布斗粟相與共之隋末天下大饑盜賊羣起君良妻欲其異居乃密取庭樹鳥雛交置巢中於是羣鳥大相與鬭舉家怪之妻乃說君良曰今天下大亂爭鬭之秋羣鳥尚不能聚居而况人乎君良以為然遂相與析居月餘君良乃知其謀夜攬妻髮罵曰破家賊乃汝耶悉召兄弟哭而告之立逐其妻復聚居如初鄉里依之以避盜賊號曰義成堡宅有六院共一㕑子弟數十人皆以禮法貞觀六年詔旌表其門張公藝鄆州壽張人九世同居北齊隋唐皆旌表其門麟德中高宗封泰山過壽張幸其宅召見公藝問所以能睦族之道公藝請紙筆以對乃書忍字百餘以進其意以為宗族所以不協由尊長衣食或有不均卑幼禮節或有不備更相責望遂成乖爭苟能相與忍之則常睦雍矣唐河東節度使柳公綽在公卿間最名有家法中門東有小齊自非朝謁之日每平旦輒出至小齊諸子仲郢等皆束帶晨省於中門之北公綽决公私事接賓客與弟公權及羣從弟再食自旦至暮不離小齊燭至則以次命子弟一人執經史立燭前躬讀一過畢乃講議居官治家之法或論文或聽琴至人定鐘然後歸寢諸子復昏定於中門之北凡二十餘年未嘗一日變易其遇饑歲則諸子皆蔬食曰昔吾兄弟侍先君為丹州刺史以學業未成不聽食肉吾不敢忘也姑姊妹姪有孤嫠者雖疏逺必為擇壻嫁之皆用刻木妝奩纈文絹為資裝常言必待資裝豐備何如嫁不失時及公綽卒仲郢一遵其法國朝公卿能守先法久而不衰者唯故李相昉家子孫數世二百餘口猶同居共㸑田園邸舍所收及有官者俸祿皆聚之一庫計口日給餅飯婚姻喪葬所費皆有常數分命子弟掌其事其規模大抵出於翰林學士宗諤所制也夫人爪牙之利不及虎豹膂力之强不及熊羆奔走之疾不及麋鹿飛揚之高不及燕雀苟非羣聚以禦外患則反為異類食矣是故聖人教之以禮使人知父子兄弟之親人知愛其父則知愛其兄弟矣愛其祖則知愛其宗族矣如枝葉之附於根幹手足之繫於身首不可離也豈徒使其粲然條理以為榮觀哉乃實欲更相依庇以扞外患也吐谷渾阿豺有子二十人病且死謂曰汝等各奉吾一隻箭將玩之俄而命母弟慕利延曰汝取一隻箭折之慕利延折之又曰汝取十九隻箭折之慕利延不能折阿豺曰汝曹知否單者易折衆者難摧戮力一心然後社稷可固言終而死彼戎狄也猶知宗族相保以為强况華夏乎聖人知一族不足以獨立也故又為之甥舅婚媾姻婭以輔之猶懼其未也故又愛養百姓以衛之故愛親者所以愛其身也愛民者所以愛其親也如是則其身安若泰山壽如箕翼他人安得而侮之哉故自古聖賢未有不先親其九族然後能施及他人者也彼愚者則不然棄其九族逺其兄弟欲以專利其身殊不知身既孤人斯戕之矣於利何有哉昔周厲王棄其九族詩人刺之曰懷德惟寧宗子惟城毋俾城壞毋獨斯畏苟為獨居斯可畏矣宋昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其根本故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢㩦二若之何去之昭公不聽果及於亂華亥欲代其兄合比為右師譖於平公而逐之左師曰汝亥也必亡汝喪而宗室於人何有人亦於汝何有既而華亥果亡孔子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德雖得之君子不貴也故欲愛其身而棄其宗族烏在其能愛身也孔子曰均無貧和無寡安無傾善為家者盡其所有而均之雖糲食不飽敝衣不完人無怨矣夫怨之所生生於自私及有厚薄也漢世諺曰一尺布尚可縫一斗粟尚可舂言尺布可縫而共衣斗粟可舂而共食譏文帝以天下之富不能容其弟也梁中書侍郎裴子野家貧妻子常苦饑寒中表貧乏者皆收養之時逢水旱以二石米為薄粥僅得遍焉躬自同之曾無厭色此得睦族之道者也家範卷一
