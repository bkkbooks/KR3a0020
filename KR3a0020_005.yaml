body:
  text: 家範卷五宋司馬光撰子下書稱舜蒸蒸乂不格姦何謂也曰言能以至孝和頑嚚昏傲使進進以善自治不至於大惡也曾子耘瓜誤斬其根晳怒建大杖以擊其背曾子仆地而不知人久之乃蘇欣然而起進於曾晳曰嚮也參得罪於大人用力教參得無疾乎退而就房援琴而歌欲令曾晳聞之知其體康也孔子聞之而怒告門弟子曰參來勿內曾參自以為無罪使人請於孔子孔子曰汝不聞乎昔舜之事瞽瞍欲使之未嘗不在於側索而殺之未嘗可得小捶則待過大杖則逃走故瞽瞍不犯不父之罪而舜不失蒸蒸之孝今參事父委身以待暴怒殪而不避身既死而陷父於不義其不孝孰大焉汝非天子之民乎殺天子之民其罪奚若曾參聞之曰參罪大矣遂造孔子而謝過此之謂也此章疑有缺文姑闕之以俟博學君子或曰孔子稱色難色難者觀父母之志趣不待發言而後順之者也然則經何以貴於諫爭乎曰諫者為救過也親之命可從而不從是悖戾也不可從而從之則陷親於大惡然而不諫是路人故當不義則不可不爭也或曰然則爭之能無咈親之意乎曰所謂爭者順而止之志在必於從也孔子曰事父母幾諫包曰幾者微也當微諫納善言於父母見志不從又敬不違勞而不怨包曰諫父母者見志有不從已諌之色則又當恭敬不違父母意而遂已之諫禮父母有過下氣怡色柔聲以諫諫若不入起敬起孝說則復諫起猶更也不說則與其得罪於鄉黨州閭寧熟諫子從父之命不可謂孝也父母怒不說而撻之流血不敢疾怨起敬起孝又曰事親有隱而無犯又曰父母有過諫而不逆又曰三諫而不聽則號泣而隨之言窮無所之也或曰諫則彰親之過奈何曰諌諸內隱諸外者也諫諸內則親過不逺隱諸外故人莫得而聞也且孝子善則稱親過則歸已凱風曰母氏聖善我無令人其心如是夫又何過之彰乎或曰子孝矣而父母不愛如之何曰責己而已昔舜父頑母嚚象傲日以殺舜為事舜往于田日號泣于旻天于父母仁覆愍下謂之旻天言舜初耕於厯山之時為父母所疾日號泣于旻天及父母克己自責不責於人負罪引慝祇載見瞽瞍䕫䕫齊栗瞽瞍亦允若誠之至也如瞽瞍者猶信而順之况不至是者乎慝惡載事也䕫䕫齊栗敬懼之貌言舜負罪引惡敬以事見于父栗懼齊莊父亦信順之言能以至誠感頑父曾子曰父母愛之喜而不忘父母惡之懼而弗怨漢侍中薛包好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被毆杖不得已廬於舍外旦入而灑掃父怒又逐之乃廬於里門晨昏不廢積歲餘父母慙而還之晉太保王祥至孝早喪親繼母朱氏不慈數譛之由是失愛於父每使掃除牛下祥愈恭謹父母有疾衣不解帶湯藥必親嘗有丹奈結實母命守之每風雨祥輒抱樹而泣其篤孝純至如此母終居喪毁悴杖而後起西河人王延九歲喪母泣血三年幾至滅性每至忌月則悲泣三旬繼母卜氏遇之無道恆以蒲穰及敗麻頭與延貯衣其姑聞而問之延知而不言事母彌謹卜氏嘗盛冬思生魚敕延求而不獲杖之流血延尋汾淩而哭忽有一魚長五尺踊出氷上延取以進母卜氏心悟撫延如已生齊始安王咨議劉渢父紹仕宋位中書郎渢母早亡紹被敕納路太后兄女為繼室渢年數歲路氏不以為子奴婢輩捶打之無期度渢母亡日輒悲啼不食彌為婢輩所苦路氏生溓渢憐愛之不忍捨常在牀帳側輒被驅捶終不肯去路氏病經年渢晝夜不離左右每有增加輒流涕不食路氏病瘥感其意慈愛遂隆路氏富盛一旦為渢立齊宇筵席不減侯王唐宣歙觀察使崔衍父倫為左丞繼母李氏不慈於衍衍時為富平尉倫使于吐蕃久方歸李氏衣敝衣以見倫倫問其故李氏稱倫使於蕃中衍不給衣食倫大怒召衍責詬命僕𨽻拉於地袒其背將鞭之衍泣涕終不自陳倫弟殷聞之趨往以身蔽衍杖不得下因大言曰衍每月俸錢皆送嫂處殷所具知何忍乃言衍不給衣食倫怒乃解由是倫遂不聽李氏之譖及倫卒衍事李氏益謹李氏所生次子郃每多取母錢使其主以書契徵負於衍衍歲為償之故衍官至江州刺史而妻子衣食無所餘子誠孝而父母不愛則孝益彰矣何患乎或曰妻子失親之意則如之何曰禮子甚宜其妻父母不說出宜猶善也子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰漢司𨽻校尉鮑永事後母至孝妻嘗於母前叱狗永去之齊征北司徒記室劉瓛音桓母孔氏甚嚴明瓛年四十餘未有婚對建元中髙帝與司徒褚彥回為瓛娶王氏女王氏穿壁挂履土落孔氏牀上孔氏不悅瓛即出其妻唐鳯閣舍人李迥秀母氏庶賤其妻崔氏嘗叱媵婢母聞之不悅迥秀即時出妻或止之曰賢室雖不避嫌疑然過非出狀何遽如此迥秀曰娶妻本以養親今違忤顔色何敢留也竟不從後漢郭巨家貧養老母妻生一子三歲母常減食與之巨謂妻曰貧乏不能供給共汝埋子子可再有母不可再得妻不敢違巨遂掘坑二尺餘得黃金一釜或曰郭巨非中道曰然以此教民民猶厚於慈而薄於孝或曰五母在禮律皆同服凡人事嫡繼慈養之情烏能比於所生或者疑於僞與曰是何言之悖也在禮為人後者斬衰三年傳曰何以三年也受重者必以尊服服之何如而可為之後同宗則可為之後如何而可以為人後支子可也為所後者之祖父母妻妻之父母昆弟昆弟之子若子若子者謂所為後之子如親子繼母如母傳曰繼母何以如母繼母之配父與因母同故孝子不敢殊也因猶親也慈母如母傳曰慈母者何也妾之無子者妾子之無母者父命妾曰以為子命子曰女以為母若是則生養之終其身如母死則喪之三年如母貴父之命也况嫡母子之君也其尊至矣梁中軍田曹行參軍庾沙彌嫡母劉氏寢疾沙彌晨昏侍側衣不解帶或應針炙輒以身先試及母亡水漿不入口纍日初進大麥薄飲經十旬方為薄粥終喪不食鹽醬冬日不衣綿纊夏日不解衰絰不出廬户晝夜號慟鄰人不忍聞所坐薦淚霑為爛墓在新林忽有旅松百許株枝葉鬱茂有異常松劉好噉甘蔗沙彌遂不復食之漢丞相翟方進既富貴後母猶在進供養甚篤太尉胡廣年八十繼母在堂朝夕贍省旁無几杖言不稱老漢顯宗命馬皇后母養肅宗肅宗孝性純篤母子慈愛始終無纎介之間帝既專以馬氏為外家故所生賈貴人不登極位賈氏親宗無受寵榮者及太后崩乃䇿書加貴人玉赤綬而已古人有丁蘭者母早亡不及養乃刻木而事之彼賢者孝愛之心發於天性失其親而無所施至於刻木猶可事也况嫡繼慈養之存乎聖人順賢者之心而為之禮豈有聖人而教人為僞者乎葬者人子之大事死者以窀穸為安宅兆而未葬猶行而未有歸也是以孝子雖愛親留之不敢久也古者天子七月諸侯五月大夫三月士踰月誠由禮物有厚薄奔赴有逺近不如是不能集也國家諸令王公以下皆三月而葬蓋以待同位外姻之會葬者適時之宜更為中制也禮未葬不變服啜粥居倚廬寢苫枕塊既虞而後有所變蓋孝子之心以為親未獲所安已不敢即安也漢蜀郡太守廉范王莽大司徒丹之孫也父遭喪亂客死於蜀漢范遂流寓西州西州平歸鄉里年五十辭母西迎父喪蜀都太守張穆丹之故吏重資送范范無所受與客步負喪歸葭萌載船觸石破沒范抱持棺柩遂俱沉溺衆傷其義鉤求得之療救僅免於死卒得歸葬宋會稽賈恩母亡未葬為鄰火所逼恩及妻柏氏號哭奔救鄰近赴助棺櫬得免恩及柏氏俱燒死有司奏改其里為孝義里蠲租布三世追贈恩顯親左尉會稽郭原平父亡為塋壙凶功不欲假人已雖巧而不解作墓乃訪邑中有塋墓者助之運力經時展勤久乃間練又自賣丁夫以供衆費窀穸之事儉而當禮性無術學因心自然葬畢詣所買主執役無懈與諸奴分務讓逸取勞主人不忍使每遣之原平服勤未嘗暫替傭賃養母有餘聚以自贖海虞令何子平母喪去官哀毁踰禮每至哭踊頓絶方蘇屬大明末東土饑荒繼以師旅八年不得營葬晝夜號哭常如袒括之日冬不衣絮暑不就清凉一日以數合米為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未伸天地一罪人耳屋何宜覆蔡興宗為會稽太守甚加矜賞為營冡壙新野庾震喪父母居貧無以葬賃書以營事至手掌穿然後成葬事賢者於葬何如其汲汲也今世俗信術者妄言以為葬不擇地及歲月日時則子孫不利禍殃總至乃至終喪除服或十年或二十年或終身或纍世猶不葬至為水火所漂焚他人所投棄失亡尸柩不知所之者豈不哀哉人所貴有子孫者為死而形體有所付也而既不葬則與無子孫而死道路者奚以異乎詩云行有死人尚或殣之况為人子孫乃忍棄其親而不葬哉唐太常博士吕才叙葬書曰孝經云卜其宅兆而安厝之蓋以窀穸既終永安體魄而朝市遷變泉石交侵不可前知故謀之龜筮近代或選年月或相墓田以為一事失所禍及死生按禮天子諸侯大夫葬皆有月數則是古人不擇年月也春秋九月丁巳葬定公雨不克葬戊午日中乃克葬是不擇日也鄭簡公司墓之室當道毁之則朝而窆不毁則日中而窆子産不毁是不擇時也古之葬者皆於國都之北域有常處是不擇地也今葬者以為子孫富貴貧賤夭壽皆因卜所致夫子文為令尹而三已柳下惠為士師而三黜討其邱壠未嘗改移而野俗無識妖巫妄言遂於躃踊之際擇葬地而希官爵荼毒之秋選葬時而規財利斯言至矣夫死生有命富貴在天固非葬所能移就使能移孝子何忍委其親不葬而求利於已哉世又有用羌胡法自焚其柩收燼骨而葬之者人習為常恬莫之怪嗚呼訛俗悖戾乃至此乎或曰旅宦逺方貧不能致其柩不焚之何以致其就葬曰如廉范輩豈其家富也延陵季子有言骨肉歸復于土命也魂氣則無不之也舜為天子巡狩至蒼梧而殂葬於其野彼天子猶然况士民乎必也無力不能歸其柩即所亡之地而葬之不猶愈於毁焚乎或曰生事之以禮死葬之以禮祭之以禮具此數者可以為大孝乎曰未也天子以德教加於百姓刑於四海為孝諸侯以保社稷為孝卿大夫以守其宗廟為孝士以保其祿位為孝皆謂能成其先人之志不墜其業者也晉庾袞父戒袞以酒袞嘗醉自責曰余廢先人之戒其何以訓人乃於父墓前自杖三十可謂能不忘訓辭矣詩云題彼鶺鴒載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生經曰立身行道揚名於後世以顯父母孝之終也又曰事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日用三牲之養猶為不孝也內則曰父母雖沒將為善思貽父母令名必果將為不善思貽父母羞辱必不果貽遺也果决也公明儀問於曾子曰夫子可以為孝乎曾子曰是何言歟是何言歟君子之所謂孝者先意承志諭父母於道參直養者也安能為孝乎曾子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不備烖及其親敢不敬乎亨熟羶薌嘗而薦之非孝也君子之所謂孝也國人稱願然曰幸哉有子如此所謂孝也已為人子能如是可謂之孝有終矣家範卷五
