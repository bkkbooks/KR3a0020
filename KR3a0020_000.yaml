body:
  text: 家範儒家類提要臣等謹按家範十卷宋司馬光撰光所著温公易説諸書已别著録是書見於宋史藝文志文獻通考者卷目俱與此相合葢猶當時原本自顔之推作家訓以教子弟其議論甚正而詞㫖氾濫不能盡本諸經訓至狄仁傑著有家範一卷史志雖載其目而書已不傳光因取仁傑舊名别加甄輯以示後學準繩首載周易家人卦辭大學孝經堯典詩思齊篇語則即其全書之序也其後自治家至乳母凡十九篇皆襍採史傳事可為法則者亦間有光所論説與朱子小學義例差異而用意畧同其節目備具切於日用簡而不煩實足為儒者治行之要朱子嘗論周禮師氏云至徳以為道本明道先生以之敏徳以為行本司馬温公以之觀於是編其型方訓俗之規尤可以槩見矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e54b07dd4eb395eb2c4a677616e3424415a85fec293c61a6672976167449906a
