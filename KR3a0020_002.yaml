body:
  text: 家範卷二宋司馬光撰祖為人祖者莫不思利其後世然果能利之者鮮矣何以言之今之為後世謀者不過廣營生計以遺之田疇連阡陌邸肆跨坊曲粟麥盈囷倉金帛充篋笥慊慊然求之猶未足施施然自以為子子孫孫纍世用之莫能盡也然不知以義方訓其子以禮法齊其家自於數十年中勤身苦體以聚之而子孫於時歲之間奢靡遊蕩以散之反笑其祖考之愚不知自娛又怨其吝嗇無恩於我而厲虐之也始則欺紿攘竊以充其欲不足則立券舉債於人俟其死而償之觀其意惟患其考之壽也甚者至於有疾不療陰行鴆毒亦有之矣然則嚮之所以利後世者適足以長子孫之惡而為身禍也頃嘗有士大夫其先亦國朝名臣也家甚富而尤吝嗇斗升之粟尺寸之帛必身自出納鎖而封之晝則佩鑰於身夜則置鑰於枕下病甚困絶不知人子孫竊其鑰開藏室發篋笥取其財其人後蘇即捫枕下求鑰不得憤怒遂卒其子孫不哭相與爭匿其財遂致鬭訟其處女亦䝉首執牒自訐於府庭以爭嫁資為鄉黨笑蓋由子孫自幼及長惟知有利不知有義故也夫生生之資固人所不能無然勿求多餘多餘希不為纍矣使其子孫果賢耶豈蔬糲布褐不能自營至死於道路乎若其不賢耶雖積金滿堂奚益哉多藏以遺子孫吾見其愚之甚也然則賢聖皆不顧子孫之匱乏邪曰何為其然也昔者聖人遺子孫以德以禮賢人遺子孫以廉以儉舜自側微積德至於為帝子孫保之享國百世而不絶周自后稷公劉太王王季文王積德纍功至於武王而有天下其詩曰詒厥孫謀以燕翼子言豐德澤明禮法以遺後世而安固之也故能子孫承統八百餘年其支庶猶為天下之顯諸侯棊布於海內其為利豈不大哉孫叔敖為楚相將死戒其子曰王數封我矣吾不受也我死王則封汝必無受利地楚越之間有寢邱者此其地不利而名甚惡可長有者唯此也孫叔敖死王以美地封其子其子辭請寢邱纍世不失漢相國蕭何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢無為勢家所奪太子太傅疏廣乞骸骨歸鄉里天子賜金二十斤太子贈以五十斤廣日令家具設酒食請族人故舊賓客相與娛樂數問其家金餘尚有幾何趣賣以共具居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫冀及君時頗立産業基址今日飲食費且盡宜從大人所勸說君買田宅老人即以閒暇時為廣言此計廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既亡以教化子孫不欲益其過而生怨涿郡太守楊震性公廉子孫常蔬食步行故舊長者或欲公為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎南唐德勝軍節度使兼中書令周本好施或勸之曰公春秋髙宜少留餘資以遺子孫本曰吾繫草屩事吳武王位至將相誰遺之乎近故張文節公為宰相所居堂室不蔽風雨服用飲膳與始為河陽書記時無異其所親或規之曰公月入俸祿幾何而自奉儉薄如此外人不以公清儉為美反以為有公孫布被之詐文節歎曰以吾今日之祿雖侯服王食何憂不足然人情由儉入奢則易由奢入儉則難此祿安能常恃一旦失之家人既習於奢不能頓儉必至失所曷若無失其常吾雖違世家人猶如今日乎聞者服其逺慮此皆以德業遺子孫者也所得顧不多乎晉光祿大夫張澄當葬父郭璞為占墓地曰葬某處年過百歲位至三司而子孫不蕃某處年幾減半位裁鄉校而纍世貴顯澄乃葬其劣處位止光祿年六十四而亡其子孫昌熾公侯將相至梁陳不絶雖未必因葬地而然足見其愛子孫厚於身矣先公既登侍從常曰吾所得已多當留以遺子孫處心如此其顧念後世不亦深乎家範卷二
